<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人链接库</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">Local Link Library</p>
        <h1>个人链接库</h1>
      </div>

      <div class="top-actions">
        <label class="search-box" for="searchInput">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="标题、网址、分类、标签、简介、使用场景">
        </label>
        <button id="addLinkBtn" class="primary-btn" type="button">+ 添加链接</button>
        <button id="connectJsonBtn" class="ghost-btn" type="button">连接 JSON 文件</button>
        <button id="importBtn" class="ghost-btn" type="button">导入 JSON</button>
        <button id="exportBtn" class="ghost-btn" type="button">导出 JSON</button>
        <input id="importFileInput" class="hidden-file" type="file" accept="application/json,.json">
      </div>
    </header>

    <main id="dashboard" class="dashboard">
      <aside id="filterPanel" class="filter-panel" aria-label="筛选条件">
        <div class="filter-panel-header">
          <div class="filter-title">
            <p class="eyebrow">Filters</p>
            <h2>筛选</h2>
          </div>
          <button id="sidebarToggleBtn" class="sidebar-toggle" type="button" aria-expanded="true" aria-controls="filterPanelBody" title="收起筛选">
            <span class="toggle-icon" aria-hidden="true">&lsaquo;</span>
            <span class="toggle-text">收起</span>
          </button>
        </div>

        <div id="filterPanelBody" class="filter-panel-body">
          <section>
            <h2>分类</h2>
            <div id="categoryFilters" class="filter-list"></div>
          </section>

          <section>
            <h2>状态</h2>
            <div id="statusFilters" class="filter-list"></div>
          </section>

          <section>
            <h2>标签</h2>
            <div id="tagFilters" class="tag-filter-list"></div>
          </section>
        </div>
      </aside>

      <section class="content-area" aria-live="polite">
        <div class="summary-bar">
          <div>
            <strong id="resultCount">0</strong>
            <span>条链接</span>
          </div>
          <div class="summary-actions">
            <span id="storageStatus" class="storage-status">浏览器自动保存</span>
            <button id="clearFiltersBtn" class="text-btn" type="button">清空筛选</button>
          </div>
        </div>

        <div id="linkList" class="link-grid"></div>
        <div id="emptyState" class="empty-state" hidden>
          <h2>没有找到链接</h2>
          <p>换一个关键词或清空筛选后再试。</p>
        </div>
      </section>
    </main>
  </div>

  <dialog id="linkDialog" class="link-dialog">
    <form id="linkForm" method="dialog" class="link-form">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">Link Details</p>
          <h2 id="dialogTitle">添加链接</h2>
        </div>
        <button id="closeDialogBtn" class="icon-btn" type="button" aria-label="关闭">×</button>
      </div>

      <div class="form-grid">
        <label>
          标题
          <input id="titleInput" name="title" type="text" required>
        </label>

        <label>
          URL
          <input id="urlInput" name="url" type="url" placeholder="https://example.com" required>
        </label>

        <label>
          分类
          <input id="categoryInput" name="category" type="text" list="categoryOptions" required>
          <datalist id="categoryOptions"></datalist>
        </label>

        <label>
          标签
          <input id="tagsInput" name="tags" type="text" placeholder="逗号分隔，例如 AI, 写作, 资料">
        </label>

        <label>
          评分
          <select id="ratingInput" name="rating">
            <option value="1">1 星</option>
            <option value="2">2 星</option>
            <option value="3">3 星</option>
            <option value="4">4 星</option>
            <option value="5">5 星</option>
          </select>
        </label>

        <label>
          状态
          <select id="statusInput" name="status"></select>
        </label>
      </div>

      <label>
        这个网站是干什么的
        <textarea id="descriptionInput" name="description" rows="4" required></textarea>
      </label>

      <label>
        以后什么时候用
        <textarea id="useCaseInput" name="useCase" rows="4" required></textarea>
      </label>

      <p id="formError" class="form-error" role="alert"></p>

      <div class="dialog-actions">
        <button id="cancelFormBtn" class="ghost-btn" type="button">取消</button>
        <button class="primary-btn" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
